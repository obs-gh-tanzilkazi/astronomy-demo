# opentelemetry-demo override values
# Adds the Observe forwarder as an additional export destination for
# traces, metrics, and logs. All existing exporters are preserved.
#
# Also bumps the accounting service memory limit — .NET runtime exceeds
# the chart default of 120Mi and causes OOMKilled (exit 137).

components:
  accounting:
    resources:
      limits:
        memory: 300Mi
      requests:
        memory: 150Mi

opentelemetry-collector:
  config:
    exporters:
      otlp/observe:
        endpoint: http://observe-agent-forwarder.observe.svc.cluster.local:4317
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          processors: [memory_limiter, resourcedetection, resource, transform, batch]
          exporters: [otlp/jaeger, debug, spanmetrics, otlp/observe]
        metrics:
          receivers: [otlp, kafkametrics, spanmetrics]
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [otlphttp/prometheus, debug, otlp/observe]
        logs:
          processors: [memory_limiter, resourcedetection, resource, batch]
          exporters: [opensearch, debug, otlp/observe]

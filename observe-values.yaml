# Observe Agent Helm values
# User-supplied values preserved from: helm get values observe-agent -n observe
# Fix 1: forwarder host ports disabled to avoid conflict with otel-collector-agent
#         DaemonSet from the astronomy-demo app which holds ports 4317, 4318, 6831,
#         14250, 14268, 9411 on every node. The forwarder still listens on these
#         containerPorts and is reachable via its ClusterIP service.
# Fix 2: forwarder CPU request reduced from default 300m to 150m so it fits on a node
#         with ~250m free. No CPU limit set so it can still burst freely.

agent:
  config:
    global:
      fleet:
        enabled: true

application:
  REDMetrics:
    enabled: true
  prometheusScrape:
    enabled: true

cluster:
  deploymentEnvironment:
    name: astronomy-demo
  name: observe-agent-monitored-cluster

node:
  containers:
    logs:
      enabled: true
  forwarder:
    enabled: true
    metrics:
      outputFormat: otel

observe:
  collectionEndpoint:
    value: https://177179220164.collect.observeinc.com/

forwarder:
  resources:
    requests:
      cpu: 150m
      memory: 512Mi
    limits:
      memory: 512Mi
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      hostPort: 0
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      hostPort: 0
      protocol: TCP
    jaeger-compact:
      enabled: true
      containerPort: 6831
      servicePort: 6831
      hostPort: 0
      protocol: UDP
    jaeger-grpc:
      enabled: true
      containerPort: 14250
      servicePort: 14250
      hostPort: 0
      protocol: TCP
    jaeger-thrift:
      enabled: true
      containerPort: 14268
      servicePort: 14268
      hostPort: 0
      protocol: TCP
    zipkin:
      enabled: true
      containerPort: 9411
      servicePort: 9411
      hostPort: 0
      protocol: TCP
